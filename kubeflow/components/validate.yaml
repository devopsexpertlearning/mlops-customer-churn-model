name: Validate Data
description: Validates raw data schema, value ranges, and target column.
inputs:
  - {name: raw_path, type: String, description: 'Path to the raw CSV dataset'}
outputs:
  - {name: validation_report_path, type: String, description: 'Output path for the validation report JSON'}
implementation:
  container:
    image: mlops-customer-churn:latest
    command: [python, -m, customer_churn.validate]
    env:
      DATA_RAW_PATH: {inputValue: raw_path}
      DATA_VALIDATION_REPORT_PATH: {outputPath: validation_report_path}
