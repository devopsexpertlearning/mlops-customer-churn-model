name: Ingest Data
description: Ingests Telco Customer Churn data from public repository.
inputs:
  - {name: ingest_url, type: String, description: 'URL of the churn dataset CSV'}
outputs:
  - {name: raw_path, type: String, description: 'Output path for the downloaded raw CSV'}
implementation:
  container:
    image: mlops-customer-churn:latest
    command: [python, -m, customer_churn.ingest]
    env:
      DATA_INGEST_URL: {inputValue: ingest_url}
      DATA_RAW_PATH: {outputPath: raw_path}
