name: Feature Engineering
description: Scales numeric features, one-hot encodes categorical features, and serializes the preprocessor.
inputs:
  - {name: train_path, type: String, description: 'Path to the processed train split'}
  - {name: test_path, type: String, description: 'Path to the processed test split'}
outputs:
  - {name: train_features_path, type: String, description: 'Output path for train features CSV'}
  - {name: test_features_path, type: String, description: 'Output path for test features CSV'}
  - {name: preprocessor_path, type: String, description: 'Output path for serialized preprocessor pkl'}
implementation:
  container:
    image: mlops-customer-churn:latest
    command: [python, -m, customer_churn.features]
    env:
      DATA_PROCESSED_TRAIN_PATH: {inputValue: train_path}
      DATA_PROCESSED_TEST_PATH: {inputValue: test_path}
      DATA_FEATURES_TRAIN_PATH: {outputPath: train_features_path}
      DATA_FEATURES_TEST_PATH: {outputPath: test_features_path}
      MODEL_PREPROCESSOR_PATH: {outputPath: preprocessor_path}
