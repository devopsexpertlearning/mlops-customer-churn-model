services:
  postgres:
    image: postgres:alpine
    container_name: mlops-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: mluser
      POSTGRES_PASSWORD: mlpassword
      POSTGRES_DB: mldb
    volumes:
      - postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mluser -d mldb"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  minio:
    image: minio/minio:latest
    container_name: mlops-minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadminpassword
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # Simple bucket creation helper
  createbuckets:
    image: minio/mc:latest
    container_name: mlops-minio-mc
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      /usr/bin/mc alias set localminio http://minio:9000 minioadmin minioadminpassword;
      /usr/bin/mc mb --ignore-existing localminio/mlflow-artifacts;
      /usr/bin/mc mb --ignore-existing localminio/dvc-cache;
      exit 0;
      "

  mlflow:
    image: ghcr.io/mlflow/mlflow:latest
    container_name: mlops-mlflow
    ports:
      - "5000:5000"
    environment:
      - AWS_ACCESS_KEY_ID=minioadmin
      - AWS_SECRET_ACCESS_KEY=minioadminpassword
      - AWS_DEFAULT_REGION=us-east-1
      - MLFLOW_S3_ENDPOINT_URL=http://minio:9000
      - MLFLOW_S3_IGNORE_TLS=true
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    entrypoint: >
      sh -c "
      pip install --no-cache-dir psycopg2-binary boto3 &&
      mlflow server
      --backend-store-uri postgresql://mluser:mlpassword@postgres:5432/mldb
      --default-artifact-root s3://mlflow-artifacts/
      --host 0.0.0.0
      --port 5000
      "
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000/')"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  api:
    image: customer-churn-api:latest
    container_name: mlops-customer-churn-api
    ports:
      - "8000:8000"
    environment:
      - MODEL_PATH=models/model.pkl
      - PREPROCESSOR_PATH=models/preprocessor.pkl
      - LOG_LEVEL=INFO
    volumes:
      - ./models:/app/models
      - ./configs:/app/configs
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    depends_on:
      mlflow:
        condition: service_healthy
    restart: unless-stopped

